<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Form</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        table {
            border-collapse: collapse;
            width: 550px;
            background: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background-color: #a9f2ac;
            color: black;
            text-align: left;
            padding: 12px;
        }

        td {
            padding: 12px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea,
        select,
        input[type="file"] {
            width: 80%;
            padding: 10px;
            margin: 4px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: 'Roboto', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        textarea:focus,
        select:focus,
        input[type="file"]:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 5px #4CAF50;
        }

        button[type="submit"],
        input[type="reset"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 900;
            transition: background 0.3s ease;
        }

        button[type="submit"]:hover,
        input[type="reset"]:hover {
            background-color: #45a049;
        }

        span {
            color: red;
            font-size: 12px;
        }

        th[colspan="2"] {
            text-align: center;
            font-size: 20px;
            background-color: #2E8B57;
            color: white;
        }

        input[type="radio"],
        input[type="checkbox"] {
            margin-right: 5px;
            transform: scale(1.2);
        }

        select {
            cursor: pointer;
        }

        textarea {
            resize: vertical;
        }
    </style>
</head>
<body>
    <table border="1" cellspacing="" cellpadding="8">
        <form onsubmit="return validateForm()">
            <tr>
                <th colspan="2"><b><i>Fill The Form Below</i></b></th>
            </tr>
            <tr>
                <th>Name</th>
                <th>
                    <input type="text" id="fname" name="a-name" oninput="validateName()">
                    <br>
                    <span id="n-msg"></span>
                </th>
            </tr>
            <tr>
                <th>Email</th>
                <th>
                    <input type="email" id="eml" name="email" oninput="validateEmail()">
                    <br>
                    <span id="e-msg"></span>
                </th>
            </tr>
            <tr>
                <th>Password</th>
                <th>
                    <input type="password" id="passwd" name="pswd" minlength="4" maxlength="8" placeholder="Password" oninput="validatePassword()">
                    <br>
                    <span id="pass"></span>
                </th>
            </tr>
            <tr>
                <th>Feedback</th>
                <th>
                    <textarea id="feedbk" name="Feedback" rows="4" cols="20" oninput="validateFeedback()"></textarea>
                    <br>
                    <span id="feed"></span>
                </th>
            </tr>
            <tr>
                <th>Gender</th>
                <th>
                    <input type="radio" name="Gender" value="male" onclick="validateGender()">Male
                    <input type="radio" name="Gender" value="female" onclick="validateGender()">Female
                    <br>
                    <span id="gen"></span>
                </th>
            </tr>
            <tr>
                <th>Hobby</th>
                <th>
                    <input type="checkbox" name="hobby" value="Cricket" onclick="validateHobby()">Cricket
                    <input type="checkbox" name="hobby" value="Kabaddi" onclick="validateHobby()">Kabaddi
                    <input type="checkbox" name="hobby" value="Hockey" onclick="validateHobby()">Hockey
                    <input type="checkbox" name="hobby" value="Football" onclick="validateHobby()">Football
                    <br>
                    <span id="hobby-msg"></span>
                </th>
            </tr>
            <tr>
                <th>City</th>
                <th>
                    <select id="city" onchange="validateCity()">
                        <option value="">--select city--</option>
                        <option value="Rajkot">Rajkot</option>
                        <option value="Jamnager">Jamnager</option>
                        <option value="Morbi">Morbi</option>
                    </select>
                    <br><span id="city-msg"></span>
                </th>
            </tr>
            <tr>
                <th>Document</th>
                <th>
                    <input type="file" id="dmt" name="file" multiple onchange="validateDocument()">
                    <br><span id="doc"></span>
                </th>
            </tr>
            <tr>
                <th colspan="2">
                    <button type="submit">Submit</button>
                    <input type="reset" value="Clear All" onclick="clearMessages()">
                </th>
            </tr>
        </form>
    </table>

<script>
function validateName() {
    const first = document.getElementById("fname").value;
    document.getElementById("n-msg").innerHTML = first.trim() === "" ? "Please enter your name" : "";
}

function validateEmail() {
    const email = document.getElementById("eml").value;
    document.getElementById("e-msg").innerHTML = email.trim() === "" ? "Please enter your email" : "";
}

function validatePassword() {
    const pswd = document.getElementById("passwd").value;
    document.getElementById("pass").innerHTML = pswd.trim() === "" ? "Please enter password" : "";
}

function validateFeedback() {
    const fback = document.getElementById("feedbk").value;
    document.getElementById("feed").innerHTML = fback.trim() === "" ? "Please enter feedback" : "";
}

function validateGender() {
    const genders = document.getElementsByName("Gender");
    const selected = Array.from(genders).some(g => g.checked);
    document.getElementById("gen").innerHTML = selected ? "" : "Please select Gender";
}

function validateHobby() {
    const hobbies = document.getElementsByName("hobby");
    const selected = Array.from(hobbies).some(h => h.checked);
    document.getElementById("hobby-msg").innerHTML = selected ? "" : "Please select at least one hobby";
}

function validateCity() {
    const city = document.getElementById("city").value;
    document.getElementById("city-msg").innerHTML = city === "" ? "Please select a city" : "";
}

function validateDocument() {
    const doc = document.getElementById("dmt").value;
    document.getElementById("doc").innerHTML = doc === "" ? "Please select document" : "";
}

function clearMessages() {
    const msgIds = ["n-msg", "e-msg", "pass", "feed", "gen", "hobby-msg", "city-msg", "doc"];
    msgIds.forEach(id => document.getElementById(id).innerHTML = "");
}

function validateForm() {
    validateName();
    validateEmail();
    validatePassword();
    validateFeedback();
    validateGender();
    validateHobby();
    validateCity();
    validateDocument();

    // check if any message spans are non-empty
    const errors = ["n-msg", "e-msg", "pass", "feed", "gen", "hobby-msg", "city-msg", "doc"];
    for(let id of errors) {
        if(document.getElementById(id).innerHTML !== "") return false;
    }
    return true; // allow submit
}
</script>
</body>
</html>
